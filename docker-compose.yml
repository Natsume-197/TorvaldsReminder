version: "3.9"

services:
  mongo:
    image: mongo:8
    container_name: torvald_mongo
    restart: unless-stopped
    ports:
      - "${PORT_MONGO}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5
    networks: [torvald_net]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: torvald_api
    restart: unless-stopped
    ports:
      - "${PORT_API}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - MongoDB__ConnectionString=${MONGO_CONNECTION_STRING}
      - MongoDB__DatabaseName=${MONGO_DATABASE}
      - Email__Host=${EMAIL_HOST}
      - Email__Port=${EMAIL_PORT}
      - Email__From=${EMAIL_FROM}
      - Email__Username=${EMAIL_USERNAME}
      - Email__Password=${EMAIL_PASSWORD}
    depends_on:
      mongo:
        condition: service_healthy
    networks: [torvald_net]

  mailpit:
    image: axllent/mailpit:latest
    container_name: torvald_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "${PORT_MAILPIT_UI}:8025"
    networks: [torvald_net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: torvald_frontend
    restart: unless-stopped
    ports:
      - "${PORT_FRONTEND}:4200"
    depends_on: [api]
    networks: [torvald_net]
    
volumes:
  mongo_data:

networks:
  torvald_net:
    driver: bridge
